_min_copier_version: "9.5.0"
_subdirectory: "{{ _template_subdirectory }}"
_answers_file: ".copier-answers.yml"
_envops:
  keep_trailing_newline: true

# Files that should never be clobbered on `copier update`
_skip_if_exists:
  - "AGENTS.md"
  - "README.md"
  - "CHANGELOG.md"
  - "pyproject.toml"
  - "package.json"
  - "Package.swift"
  - ".env"
  - ".env.local"

# Internal — set via `--data _template_subdirectory=...` by scaffold-discipline wrapper.
# Listed as a question so direct `uvx copier copy` (without the wrapper) still prompts.
_template_subdirectory:
  type: str
  help: "Internal: which template subdirectory to render"
  choices:
    - template-ha-component
    - template-python
    - template-ts-node
    - template-swift-ios

# User-facing questions
project_name:
  type: str
  help: "Project name (PascalCase or kebab-case, e.g. ha-pricehawk)"

project_slug:
  type: str
  default: "{{ project_name | lower | replace(' ', '-') | replace('_', '-') }}"
  help: "URL/path slug (auto from project_name)"

component_slug:
  type: str
  default: "{{ project_slug | replace('-', '_') }}"
  help: "Python module name for HA component (lowercase + underscores)"
  when: "{{ _template_subdirectory == 'template-ha-component' }}"

component_friendly_name:
  type: str
  default: "{{ project_name }}"
  help: "Display name shown to end users"
  when: "{{ _template_subdirectory == 'template-ha-component' }}"

description:
  type: str
  help: "One-line description (used in README + manifest.json)"

author_name:
  type: str
  default: "Ryan Foyle"

author_email:
  type: str
  default: "ryanf@me.com"

github_user:
  type: str
  default: "Artic0din"

license:
  type: str
  choices: [MIT, Apache-2.0, GPL-3.0]
  default: MIT

python_version:
  type: str
  default: "3.13"
  choices: ["3.12", "3.13"]
  when: "{{ _template_subdirectory in ['template-python', 'template-ha-component'] }}"

home_assistant_min:
  type: str
  default: "2026.4.0"
  when: "{{ _template_subdirectory == 'template-ha-component' }}"

python_module:
  type: str
  default: "{{ project_slug | replace('-', '_') }}"
  help: "Python package name for generic Python projects (lowercase + underscores)"
  when: "{{ _template_subdirectory == 'template-python' }}"

# Post-generation tasks (Copier 9.x requires --trust to run these)
_tasks:
  - command: "git init -b main"
    when: "{{ _copier_operation == 'copy' }}"
    working_directory: "{{ _copier_conf.dst_path }}"

  - command: "[ -L CLAUDE.md ] || ln -s AGENTS.md CLAUDE.md"
    when: "{{ _copier_operation == 'copy' }}"
    working_directory: "{{ _copier_conf.dst_path }}"

  - command: "uv sync"
    when: "{{ _copier_operation == 'copy' and _template_subdirectory in ['template-python', 'template-ha-component'] }}"
    working_directory: "{{ _copier_conf.dst_path }}"

  - command: "uv run pre-commit install"
    when: "{{ _copier_operation == 'copy' and _template_subdirectory in ['template-python', 'template-ha-component'] }}"
    working_directory: "{{ _copier_conf.dst_path }}"

# Option A: defer GitHub repo creation + label provisioning to a printed checklist.
# Keeps scaffold idempotent locally; lets user pick visibility + name interactively.
_message_after_copy: |
  ✓ Generated {{ project_name }} from {{ _template_subdirectory }} v2.

  Next steps (run from {{ _copier_conf.dst_path }}):

    1. Initial commit:
         git add . && git commit -m "feat: initial scaffold from {{ _template_subdirectory }} v2"

    2. Create GitHub repo + push (choose --public or --private):
         gh repo create {{ github_user }}/{{ project_slug }} --public --source=. --push

    3. Provision the ai-review-override label:
         gh label create ai-review-override \
           --color FFD700 \
           --description "Bypass AI review gate" \
           --repo {{ github_user }}/{{ project_slug }} \
           --force

    4. Enable Codex GitHub App on the repo + add Codex bot to branch protection
       Required Reviewers list.

    5. Set CODECOV_TOKEN repo secret (account-level token from codecov.io).

  Re-run `copier update` from inside the project directory to pull template
  improvements after the dev-templates repo evolves.
