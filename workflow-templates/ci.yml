name: CI

# Editable caller for the reusable ci-core workflow. Owns the literal
# "CI passed" rollup so branch protection has a stable check name.
# Add repo-specific jobs alongside `core:`; add them to `ci-passed.needs`.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  core:
    uses: Artic0din/dev-templates/.github/workflows/ci-core.yml@v1
    with:
      language: typescript      # python | swift | typescript | node
      # Uncomment + set for monorepos where the project lives in a subdirectory:
      # working_directory: nesc-scheduler
      # Set for repos using package-lock.json instead of pnpm-lock.yaml:
      # package_manager: npm
    secrets: inherit

  # ==== Repo-specific jobs go here ====
  # Example:
  # integration:
  #   if: github.event_name == 'pull_request'
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - run: ./tests/integration.sh

  ci-passed:
    name: CI passed
    if: always()
    needs: [core]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all dependencies succeeded
        run: |
          if [[ "${{ needs.core.result }}" != "success" ]]; then
            echo "::error::core job result: ${{ needs.core.result }}"
            exit 1
          fi
          echo "✓ CI passed"
