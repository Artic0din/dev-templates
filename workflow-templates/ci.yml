name: CI

# Editable caller for the reusable ci-core workflows (v1.3.0+).
# Pick ONE of the per-language reusable workflows. Owns the literal
# "CI passed" rollup so branch protection has a stable check name.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  core:
    # --- Python (default for this template) ---
    uses: Artic0din/dev-templates/.github/workflows/ci-core-python.yml@v1
    # with:
    #   working_directory: .       # Set for monorepos.

    # --- TypeScript (uncomment to use) ---
    # uses: Artic0din/dev-templates/.github/workflows/ci-core-typescript.yml@v1
    # with:
    #   working_directory: nesc-scheduler   # monorepo subdirectory
    #   package_manager: npm                # pnpm (default) | npm

    # --- Swift (uncomment to use) ---
    # uses: Artic0din/dev-templates/.github/workflows/ci-core-swift.yml@v1
    # with:
    #   working_directory: .

    secrets: inherit

  ci-passed:
    name: CI passed
    if: always()
    needs: [core]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all dependencies succeeded
        run: |
          if [[ "${{ needs.core.result }}" != "success" ]]; then
            echo "::error::core job result: ${{ needs.core.result }}"
            exit 1
          fi
          echo "✓ CI passed"
