name: CI core

on:
  workflow_call:
    inputs:
      language:
        required: true
        type: string
      working_directory:
        required: false
        type: string
        default: '.'
      package_manager:
        required: false
        type: string
        default: 'pnpm'
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      CODECOV_TOKEN:
        required: false

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - if: inputs.language == 'typescript' && inputs.package_manager == 'npm'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ${{ inputs.working_directory }}/package-lock.json
      - if: inputs.language == 'typescript' && inputs.package_manager == 'npm'
        working-directory: ${{ inputs.working_directory }}
        run: npm ci
      - if: inputs.language == 'typescript' && inputs.package_manager == 'npm'
        working-directory: ${{ inputs.working_directory }}
        run: npm run lint
