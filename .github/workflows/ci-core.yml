name: CI core

on:
  workflow_call:
    inputs:
      language:
        required: true
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      CODECOV_TOKEN:
        required: false

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      REVIEWDOG_GITHUB_API_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - if: inputs.language == 'python'
        uses: astral-sh/setup-uv@v3
      - if: inputs.language == 'python'
        run: uv sync --locked --all-extras --dev
      - if: inputs.language == 'python'
        uses: reviewdog/action-setup@19ad6fc8b7358ccdc9fd4a25c75dd93eeb097e1e # v1
      - if: inputs.language == 'python' && github.event_name == 'pull_request'
        run: |
          uv run ruff check --output-format rdjson | \
            reviewdog -f=rdjson -name="ruff lint" \
              -reporter=github-pr-review \
              -filter-mode=nofilter \
              -fail-level=any
      - if: inputs.language == 'python' && github.event_name != 'pull_request'
        run: uv run ruff check
      - if: inputs.language == 'python'
        run: uv run ruff format --check

      - if: inputs.language == 'typescript' || inputs.language == 'node'
        uses: pnpm/action-setup@v3
      - if: inputs.language == 'typescript' || inputs.language == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - if: inputs.language == 'typescript' || inputs.language == 'node'
        run: pnpm install --frozen-lockfile
      - if: inputs.language == 'typescript' || inputs.language == 'node'
        run: pnpm lint

      - if: inputs.language == 'swift'
        run: brew install swiftformat swiftlint
      - if: inputs.language == 'swift'
        run: swiftformat --lint .
      - if: inputs.language == 'swift'
        run: swiftlint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - if: inputs.language == 'python'
        uses: astral-sh/setup-uv@v3
      - if: inputs.language == 'python'
        run: uv sync --locked --all-extras --dev
      - if: inputs.language == 'python'
        run: uv run pyright

      - if: inputs.language == 'typescript'
        uses: pnpm/action-setup@v3
      - if: inputs.language == 'typescript'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - if: inputs.language == 'typescript'
        run: pnpm install --frozen-lockfile
      - if: inputs.language == 'typescript'
        run: pnpm exec tsc --noEmit

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ github.token }}

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - if: inputs.language == 'python'
        uses: astral-sh/setup-uv@v3
      - if: inputs.language == 'python'
        run: uv sync --locked --all-extras --dev
      - if: inputs.language == 'python'
        run: uv run pytest --cov --cov-report=xml --cov-branch

      - if: inputs.language == 'typescript' || inputs.language == 'node'
        uses: pnpm/action-setup@v3
      - if: inputs.language == 'typescript' || inputs.language == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - if: inputs.language == 'typescript' || inputs.language == 'node'
        run: pnpm install --frozen-lockfile
      - if: inputs.language == 'typescript' || inputs.language == 'node'
        run: |
          if jq -e '.scripts["test:coverage"]' package.json >/dev/null 2>&1; then
            pnpm test:coverage
          else
            pnpm test
          fi

      - if: inputs.language == 'swift'
        run: swift test --enable-code-coverage

      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  claude-review:
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - run: echo "stub claude-review (action removed for debug)"

  claude-review-gate:
    # `!cancelled()` runs on success or failure of needs (not on cancel). This
    # preserves fail-open behaviour when claude-review fails (API outage) while
    # avoiding the workflow-startup_failure GitHub throws on `always()` + needs.
    if: ${{ !cancelled() && github.event_name == 'pull_request' }}
    needs: claude-review
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    env:
      GH_TOKEN: ${{ github.token }}
      PR: ${{ github.event.pull_request.number }}
      REPO: ${{ github.repository }}
      UPSTREAM_RESULT: ${{ needs.claude-review.result }}
    steps:
      - name: Evaluate gate
        run: |
          # 1. Upstream fail-open: any non-success from claude-review passes the gate open.
          if [[ "$UPSTREAM_RESULT" != "success" ]]; then
            echo "::warning::claude-review did not succeed ($UPSTREAM_RESULT) — gate passes open"
            exit 0
          fi

          # 2. Override label: ai-review-override bypasses the gate.
          if gh pr view "$PR" --repo "$REPO" --json labels --jq '.labels[].name' \
              | grep -q '^ai-review-override$'; then
            echo "::warning::ai-review-override label set — gate bypassed"
            exit 0
          fi

          # 3. Find Claude review comment with trailer.
          COMMENT=$(gh pr view "$PR" --repo "$REPO" --json comments \
            --jq '[.comments[] | select(.body | contains("trailer:") and contains("verdict:"))] | last | .body')

          if [[ -z "$COMMENT" || "$COMMENT" == "null" ]]; then
            echo "::warning::No Claude review trailer found — passing open"
            exit 0
          fi

          # 4. Extract verdict from the yaml code fence.
          printf '%s\n' "$COMMENT" > /tmp/c.md
          FENCE='```'
          VERDICT=$(awk -v f="^[[:space:]]*${FENCE}yaml[[:space:]]*$" -v c="^[[:space:]]*${FENCE}[[:space:]]*$" \
            'BEGIN{IGNORECASE=1} $0 ~ f, $0 ~ c { print }' /tmp/c.md \
            | grep -E '^\s*verdict:' | tail -1 \
            | sed -E 's/.*verdict:\s*"?([a-z_]+)"?.*/\1/' || true)

          case "$VERDICT" in
            block_merge)
              echo "::error::Tier 1 findings present — must address before merge"
              exit 1
              ;;
            ship_it|ship_with_notes)
              echo "::notice::Verdict: $VERDICT — gate passes"
              ;;
            *)
              echo "::warning::Verdict missing or unrecognised ('$VERDICT') — passing open"
              ;;
          esac

