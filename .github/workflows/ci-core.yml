name: CI core
on:
  workflow_call:
    inputs:
      language:
        required: true
        type: string
      working_directory:
        required: false
        type: string
        default: '.'
      package_manager:
        required: false
        type: string
        default: 'pnpm'
jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "lang=${{ inputs.language }}"
          echo "wd=${{ inputs.working_directory }}"
          echo "pm=${{ inputs.package_manager }}"
