name: CI core

on:
  workflow_call:
    inputs:
      language:
        required: true
        type: string
      working_directory:
        required: false
        type: string
        default: '.'
      package_manager:
        required: false
        type: string
        default: 'pnpm'
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      CODECOV_TOKEN:
        required: false

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      REVIEWDOG_GITHUB_API_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - if: inputs.language == 'typescript' && inputs.package_manager == 'npm'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ${{ inputs.working_directory }}/package-lock.json
      - if: inputs.language == 'typescript' && inputs.package_manager == 'npm'
        working-directory: ${{ inputs.working_directory }}
        run: npm ci
      - if: inputs.language == 'typescript' && inputs.package_manager == 'npm'
        working-directory: ${{ inputs.working_directory }}
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - if: inputs.language == 'typescript' && inputs.package_manager == 'npm'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ${{ inputs.working_directory }}/package-lock.json
      - if: inputs.language == 'typescript' && inputs.package_manager == 'npm'
        working-directory: ${{ inputs.working_directory }}
        run: npm ci
      - if: inputs.language == 'typescript' && inputs.package_manager == 'npm'
        working-directory: ${{ inputs.working_directory }}
        run: npx tsc --noEmit

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - if: inputs.language == 'typescript' && inputs.package_manager == 'npm'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ${{ inputs.working_directory }}/package-lock.json
      - if: inputs.language == 'typescript' && inputs.package_manager == 'npm'
        working-directory: ${{ inputs.working_directory }}
        run: npm ci
      - if: inputs.language == 'typescript' && inputs.package_manager == 'npm'
        working-directory: ${{ inputs.working_directory }}
        run: |
          if jq -e '.scripts["test:coverage"]' package.json >/dev/null 2>&1; then
            npm run test:coverage
          else
            npm test
          fi

      # Codecov upload — only when token configured. ${{ secrets.X != '' }}
      # gating prevents startup_failure when secret is unset (PLNR case).
      - if: secrets.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
