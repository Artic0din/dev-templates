name: CI core

on:
  workflow_call:
    inputs:
      language:
        required: true
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      CODECOV_TOKEN:
        required: false

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      REVIEWDOG_GITHUB_API_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - if: inputs.language == 'python'
        uses: astral-sh/setup-uv@v3
      - if: inputs.language == 'python'
        run: uv sync --locked --all-extras --dev
      - if: inputs.language == 'python'
        uses: reviewdog/action-setup@19ad6fc8b7358ccdc9fd4a25c75dd93eeb097e1e # v1
      - if: inputs.language == 'python' && github.event_name == 'pull_request'
        run: |
          uv run ruff check --output-format rdjson | \
            reviewdog -f=rdjson -name="ruff lint" \
              -reporter=github-pr-review \
              -filter-mode=nofilter \
              -fail-level=any
      - if: inputs.language == 'python' && github.event_name != 'pull_request'
        run: uv run ruff check
      - if: inputs.language == 'python'
        run: uv run ruff format --check

      - if: inputs.language == 'typescript' || inputs.language == 'node'
        uses: pnpm/action-setup@v3
      - if: inputs.language == 'typescript' || inputs.language == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - if: inputs.language == 'typescript' || inputs.language == 'node'
        run: pnpm install --frozen-lockfile
      - if: inputs.language == 'typescript' || inputs.language == 'node'
        run: pnpm lint

      - if: inputs.language == 'swift'
        run: brew install swiftformat swiftlint
      - if: inputs.language == 'swift'
        run: swiftformat --lint .
      - if: inputs.language == 'swift'
        run: swiftlint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - if: inputs.language == 'python'
        uses: astral-sh/setup-uv@v3
      - if: inputs.language == 'python'
        run: uv sync --locked --all-extras --dev
      - if: inputs.language == 'python'
        run: uv run pyright

      - if: inputs.language == 'typescript'
        uses: pnpm/action-setup@v3
      - if: inputs.language == 'typescript'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - if: inputs.language == 'typescript'
        run: pnpm install --frozen-lockfile
      - if: inputs.language == 'typescript'
        run: pnpm exec tsc --noEmit

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ github.token }}

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - if: inputs.language == 'python'
        uses: astral-sh/setup-uv@v3
      - if: inputs.language == 'python'
        run: uv sync --locked --all-extras --dev
      - if: inputs.language == 'python'
        run: uv run pytest --cov --cov-report=xml --cov-branch

      - if: inputs.language == 'typescript' || inputs.language == 'node'
        uses: pnpm/action-setup@v3
      - if: inputs.language == 'typescript' || inputs.language == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - if: inputs.language == 'typescript' || inputs.language == 'node'
        run: pnpm install --frozen-lockfile
      - if: inputs.language == 'typescript' || inputs.language == 'node'
        run: |
          if jq -e '.scripts["test:coverage"]' package.json >/dev/null 2>&1; then
            pnpm test:coverage
          else
            pnpm test
          fi

      - if: inputs.language == 'swift'
        run: swift test --enable-code-coverage

      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  claude-review-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - run: echo "minimal gate placeholder"

