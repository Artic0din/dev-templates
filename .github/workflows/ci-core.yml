name: CI core

# Reusable workflow. Callers (each repo's ci.yml) own the literal "CI passed"
# rollup; this file exposes individual jobs only.
#
# Pinning policy (Addition A):
#   - Allow-list (floating tag): anthropics/*, github/*, actions/*, codecov/*,
#     astral-sh/*, pnpm/*. Re-audit quarterly.
#   - Everything else: SHA-pin with version comment.
#
# Dev path (Addition B): add `workflow_dispatch:` temporarily when iterating
# locally; REMOVE before tagging a release.

on:
  workflow_call:
    inputs:
      language:
        description: 'Language: python | swift | typescript | node'
        required: true
        type: string
    secrets:
      # Both optional: missing ANTHROPIC_API_KEY → claude-review fails → gate
      # passes open (fail-open). Missing CODECOV_TOKEN → upload step warns
      # but fail_ci_if_error: false keeps it from blocking.
      ANTHROPIC_API_KEY:
        required: false
      CODECOV_TOKEN:
        required: false

jobs:
  # --- Lint and format ---

  lint:
    runs-on: ubuntu-latest
    env:
      REVIEWDOG_GITHUB_API_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      # Python
      - if: inputs.language == 'python'
        uses: astral-sh/setup-uv@v3
      - if: inputs.language == 'python'
        run: uv sync --locked --all-extras --dev
      - if: inputs.language == 'python'
        uses: reviewdog/action-setup@19ad6fc8b7358ccdc9fd4a25c75dd93eeb097e1e # v1
      - if: inputs.language == 'python' && github.event_name == 'pull_request'
        run: |
          uv run ruff check --output-format rdjson | \
            reviewdog -f=rdjson -name="ruff lint" \
              -reporter=github-pr-review \
              -filter-mode=nofilter \
              -fail-level=any
      - if: inputs.language == 'python' && github.event_name != 'pull_request'
        run: uv run ruff check
      - if: inputs.language == 'python'
        run: uv run ruff format --check

      # TypeScript / Node
      - if: inputs.language == 'typescript' || inputs.language == 'node'
        uses: pnpm/action-setup@v3
      - if: inputs.language == 'typescript' || inputs.language == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - if: inputs.language == 'typescript' || inputs.language == 'node'
        run: pnpm install --frozen-lockfile
      - if: inputs.language == 'typescript' || inputs.language == 'node'
        run: pnpm lint
      - if: inputs.language == 'typescript' || inputs.language == 'node'
        run: pnpm format:check

      # Swift
      - if: inputs.language == 'swift'
        run: brew install swiftformat swiftlint
      - if: inputs.language == 'swift'
        run: swiftformat --lint .
      - if: inputs.language == 'swift'
        run: swiftlint

  # --- Type check ---

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - if: inputs.language == 'python'
        uses: astral-sh/setup-uv@v3
      - if: inputs.language == 'python'
        run: uv sync --locked --all-extras --dev
      - if: inputs.language == 'python'
        run: uv run pyright

      - if: inputs.language == 'typescript'
        uses: pnpm/action-setup@v3
      - if: inputs.language == 'typescript'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - if: inputs.language == 'typescript'
        run: pnpm install --frozen-lockfile
      - if: inputs.language == 'typescript'
        run: pnpm exec tsc --noEmit

      # Swift type-checks happen during build

  # --- Secret scanning ---

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ github.token }}

  # --- Tests ---

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - if: inputs.language == 'python'
        uses: astral-sh/setup-uv@v3
      - if: inputs.language == 'python'
        run: uv sync --locked --all-extras --dev
      - if: inputs.language == 'python'
        run: uv run pytest --cov --cov-report=xml --cov-branch

      - if: inputs.language == 'typescript' || inputs.language == 'node'
        uses: pnpm/action-setup@v3
      - if: inputs.language == 'typescript' || inputs.language == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - if: inputs.language == 'typescript' || inputs.language == 'node'
        run: pnpm install --frozen-lockfile
      # Repos may have either `pnpm test:coverage` or just `pnpm test`.
      # Prefer test:coverage; fall back to test. Coverage upload is best-effort.
      - if: inputs.language == 'typescript' || inputs.language == 'node'
        run: |
          if jq -e '.scripts["test:coverage"]' package.json >/dev/null 2>&1; then
            pnpm test:coverage
          else
            pnpm test
          fi

      - if: inputs.language == 'swift'
        run: swift test --enable-code-coverage

      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # --- Build ---

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - if: inputs.language == 'typescript' || inputs.language == 'node'
        uses: pnpm/action-setup@v3
      - if: inputs.language == 'typescript' || inputs.language == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - if: inputs.language == 'typescript' || inputs.language == 'node'
        run: pnpm install --frozen-lockfile
      - if: inputs.language == 'typescript' || inputs.language == 'node'
        run: pnpm build

      - if: inputs.language == 'swift'
        run: swift build -c release

  # --- Markdown format (Python only — TS uses prettier in lint job) ---

  markdown:
    if: inputs.language == 'python'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install mdformat mdformat-mkdocs mdformat-ruff mdformat-tables mdformat-frontmatter
      - run: mdformat --check .

  # --- Version drift guard (inlined per Risk 2) ---

  version-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract and verify versions
        run: |
          set -euo pipefail
          declare -A V=()

          if [[ -f pyproject.toml ]]; then
            V[pyproject]=$(grep -E '^version\s*=' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/' | head -1 || true)
          fi

          if [[ -f package.json ]]; then
            V[package]=$(jq -r .version package.json || true)
          fi

          PLIST=$(find . \
            -path '*/Pods/*' -prune -o \
            -path '*/Tests/*' -prune -o \
            -path '*/DerivedData/*' -prune -o \
            -path '*/.build/*' -prune -o \
            -name "Info.plist" -print 2>/dev/null \
            | grep -v -E '(Tests|Test\.|UITests)' \
            | head -1)
          if [[ -n "${PLIST:-}" ]]; then
            V[plist]=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST" 2>/dev/null || true)
          fi

          MANIFEST=$(find custom_components -maxdepth 3 -name manifest.json 2>/dev/null | head -1 || true)
          if [[ -n "${MANIFEST:-}" ]]; then
            V[manifest]=$(jq -r .version "$MANIFEST" || true)
          fi

          if [[ -f CHANGELOG.md ]]; then
            V[changelog]=$(grep -m1 '^## ' CHANGELOG.md | sed -E 's/^## \[?([0-9]+\.[0-9]+\.[0-9]+).*/\1/' || true)
          fi

          UNIQUE=$(for k in "${!V[@]}"; do [[ -n "${V[$k]}" ]] && echo "${V[$k]}"; done | sort -u)
          COUNT=$(printf '%s\n' "$UNIQUE" | grep -c . || true)

          if [[ "$COUNT" -gt 1 ]]; then
            echo "::error::Version drift detected:"
            for k in "${!V[@]}"; do
              [[ -n "${V[$k]}" ]] && echo "  $k: ${V[$k]}"
            done
            exit 1
          fi
          echo "✓ Versions consistent: $UNIQUE"

  # --- PR title check ---

  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5155ed6017 # v5.5.3
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            ci
            perf
            build
            revert
            style
          requireScope: false

  # --- Docs build (Python repos with Zensical; --strict deferred per Risk 5) ---

  docs:
    if: inputs.language == 'python'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install zensical
      - run: zensical build

  # --- Claude Code review (TEMPORARILY DISABLED for startup_failure debug) ---
  # The job is renamed to avoid feeding into claude-review-gate's needs:.
  # Gate handles missing upstream as fail-open. Restore once root cause known.

  claude-review:
    if: false
    runs-on: ubuntu-latest
    steps:
      - run: echo "claude-review temporarily disabled"

  # --- Claude review gate ---
  # NO checkout step. Uses gh CLI to query PR API only.

  claude-review-gate:
    if: always() && github.event_name == 'pull_request'
    needs: claude-review
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Handle upstream claude-review result
        id: upstream
        run: |
          RESULT="${{ needs.claude-review.result }}"
          case "$RESULT" in
            success)
              echo "::notice::claude-review succeeded"
              ;;
            failure|cancelled|skipped|*)
              echo "::warning::claude-review did not succeed ($RESULT) — gate passes open"
              echo "skip_gate=true" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Check for override label
        if: steps.upstream.outputs.skip_gate != 'true'
        id: override
        run: |
          if gh pr view "$PR" --repo "$REPO" --json labels --jq '.labels[].name' \
              | grep -q '^ai-review-override$'; then
            echo "override=true" >> "$GITHUB_OUTPUT"
            echo "::warning::ai-review-override label set — gate bypassed"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}

      - name: Find Claude review comment
        if: steps.upstream.outputs.skip_gate != 'true' && steps.override.outputs.override != 'true'
        run: |
          COMMENT=$(gh pr view "$PR" --repo "$REPO" --json comments \
            --jq '[.comments[]
                    | select(.body | contains("trailer:")
                              and contains("verdict:"))]
                   | last | .body')

          if [[ -z "$COMMENT" || "$COMMENT" == "null" ]]; then
            echo "::warning::No Claude review trailer found — passing open"
            : > /tmp/claude-comment.md
          else
            echo "$COMMENT" > /tmp/claude-comment.md
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}

      - name: Parse trailer and decide
        if: steps.upstream.outputs.skip_gate != 'true' && steps.override.outputs.override != 'true'
        run: |
          VERDICT=$(awk 'BEGIN{IGNORECASE=1}
            /^[[:space:]]*```yaml[[:space:]]*$/,/^[[:space:]]*```[[:space:]]*$/' \
            /tmp/claude-comment.md \
            | grep -E '^\s*verdict:' | tail -1 \
            | sed -E 's/.*verdict:\s*"?([a-z_]+)"?.*/\1/')

          echo "::group::Raw trailer text"
          awk 'BEGIN{IGNORECASE=1}
            /^[[:space:]]*```yaml[[:space:]]*$/,/^[[:space:]]*```[[:space:]]*$/' \
            /tmp/claude-comment.md || true
          echo "::endgroup::"

          case "$VERDICT" in
            block_merge)
              echo "::error::Tier 1 findings present — must address before merge"
              exit 1
              ;;
            ship_it|ship_with_notes)
              echo "::notice::Verdict: $VERDICT — gate passes"
              ;;
            ""|*)
              echo "::warning::Verdict missing or unrecognised ('$VERDICT') — passing open"
              ;;
          esac
