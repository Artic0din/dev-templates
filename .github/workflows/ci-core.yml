name: CI core

on:
  workflow_call:
    inputs:
      language:
        required: true
        type: string
      working_directory:
        required: false
        type: string
        default: '.'
      package_manager:
        required: false
        type: string
        default: 'pnpm'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - working-directory: ${{ inputs.working_directory }}
        run: echo "hello from $PWD; pm=${{ inputs.package_manager }}"
