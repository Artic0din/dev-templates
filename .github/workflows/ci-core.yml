name: CI core

on:
  workflow_call:
    inputs:
      language:
        required: true
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      CODECOV_TOKEN:
        required: false

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      REVIEWDOG_GITHUB_API_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - if: inputs.language == 'typescript' || inputs.language == 'node'
        uses: pnpm/action-setup@v3
      - if: inputs.language == 'typescript' || inputs.language == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - if: inputs.language == 'typescript' || inputs.language == 'node'
        run: pnpm install --frozen-lockfile
      - if: inputs.language == 'typescript' || inputs.language == 'node'
        run: pnpm lint
